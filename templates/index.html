<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biblio AI</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --cream:#f5f0e1;
  --cream-dark:#e8e0c8;
  --warm-white:#fdf8ef;
  --brown:#6b4f35;
  --brown-light:#9b7a5a;
  --green:#5a7a5c;
  --green-light:#8aaa7a;
  --green-pale:#d4e6c3;
  --text-dark:#3a2e20;
  --text-mid:#6b5a45;
  --amber:#c9874a;
  --amber-light:#e8b97a;
  --border:rgba(107,79,53,.18);
  --border2:rgba(107,79,53,.28);
  --shadow:rgba(58,46,32,.1);
}

html{scroll-behavior:smooth}

body{
  background:var(--cream);
  color:var(--text-dark);
  font-family:'Lato',sans-serif;
  font-weight:300;
  min-height:100vh;
  display:grid;
  grid-template-columns:1fr var(--sidebar-w,360px);
  grid-template-rows:auto 1fr;
  overflow:hidden;
}

/* ── DUST PARTICLES ── */
.dust{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
.mote{position:absolute;width:3px;height:3px;border-radius:50%;background:rgba(201,135,74,.35);animation:float-up linear infinite}
@keyframes float-up{
  0%  {transform:translateY(100vh) translateX(0) scale(0);opacity:0}
  10% {opacity:1}
  90% {opacity:.5}
  100%{transform:translateY(-10vh) translateX(40px) scale(1.5);opacity:0}
}

/* ── HEADER ── */
header{
  grid-column:1/-1;
  padding:1.1rem 2rem;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(to bottom,rgba(245,240,225,.98),rgba(245,240,225,.95));
  backdrop-filter:blur(8px);
  position:relative;z-index:10;
}
.logo{
  font-family:'Playfair Display',serif;
  font-size:1.5rem;font-weight:600;
  color:var(--brown);
  letter-spacing:.03em;
}
.logo span{color:var(--green);font-style:italic;font-weight:400}
.header-btns{display:flex;gap:.5rem;align-items:center}
#new-chat,#api-test-btn{
  background:transparent;
  border:1.5px solid var(--border2);
  color:var(--text-mid);
  padding:.35rem 1rem;
  border-radius:30px;
  cursor:pointer;
  font-family:'Lato',sans-serif;
  font-size:.75rem;font-weight:400;
  letter-spacing:.1em;text-transform:uppercase;
  transition:all .25s;
  text-decoration:none;display:inline-block;
}
#new-chat:hover{border-color:var(--brown);color:var(--brown);background:rgba(107,79,53,.05)}
#api-test-btn:hover{border-color:var(--green);color:var(--green);background:rgba(90,122,92,.05)}
#api-test-btn.hidden{display:none}
#lock-btn{
  background:transparent;
  border:1.5px solid var(--border2);
  color:var(--text-mid);
  padding:.35rem .9rem;
  border-radius:30px;
  cursor:pointer;
  font-family:'Lato',sans-serif;
  font-size:.8rem;
  transition:all .25s;
}
#lock-btn.unlocked{border-color:var(--green);color:var(--green)}
#lock-btn:not(.unlocked):hover{border-color:var(--brown);color:var(--brown);background:rgba(107,79,53,.05)}
#lock-btn.unlocked:hover{border-color:#c0392b;color:#c0392b;background:rgba(192,57,43,.06)}

/* ── LOCK MODAL ── */
#lock-modal{
  display:none;position:fixed;inset:0;
  background:rgba(58,46,32,.55);
  backdrop-filter:blur(6px);
  z-index:200;align-items:center;justify-content:center;
}
#lock-modal.open{display:flex}
.lock-box{
  background:var(--warm-white);
  border:1px solid var(--border2);
  border-radius:22px;
  padding:2.2rem 2rem;
  max-width:380px;width:90%;
  text-align:center;
  animation:pop .28s cubic-bezier(.34,1.3,.64,1);
  box-shadow:0 24px 60px rgba(58,46,32,.22);
}
.lock-icon{font-size:2.2rem;margin-bottom:.7rem}
.lock-title{
  font-family:'Playfair Display',serif;
  font-size:1.2rem;font-weight:600;
  color:var(--brown);margin-bottom:.4rem;
}
.lock-sub{font-size:.83rem;color:var(--text-mid);margin-bottom:1.3rem;line-height:1.6}
#lock-input{
  width:100%;
  background:var(--warm-white);
  border:1.5px solid var(--border2);
  border-radius:10px;
  color:var(--text-dark);
  font-family:'Lato',sans-serif;
  font-size:.95rem;
  padding:.65rem 1rem;
  outline:none;
  margin-bottom:.85rem;
  transition:border-color .25s;
  text-align:center;
  letter-spacing:.08em;
}
#lock-input:focus{border-color:var(--brown-light)}
#lock-submit{
  width:100%;
  background:var(--brown);
  border:none;border-radius:30px;
  color:var(--cream);
  font-family:'Lato',sans-serif;
  font-size:.82rem;font-weight:400;
  letter-spacing:.1em;text-transform:uppercase;
  padding:.7rem 1.4rem;
  cursor:pointer;
  transition:transform .2s,box-shadow .2s;
  box-shadow:0 3px 12px rgba(107,79,53,.25);
  margin-bottom:.6rem;
}
#lock-submit:hover{transform:translateY(-2px);box-shadow:0 5px 18px rgba(107,79,53,.3)}
#lock-error{font-size:.8rem;color:#c0392b;min-height:1.1rem;margin-top:.1rem}
.lock-cancel{
  background:none;border:none;
  color:var(--brown-light);font-size:.78rem;
  cursor:pointer;margin-top:.3rem;
  font-family:'Lato',sans-serif;
}
.lock-cancel:hover{color:var(--brown)}

/* ── CHAT PANEL ── */
#chat-panel{
  grid-column:1;grid-row:2;
  display:flex;flex-direction:column;
  height:calc(100vh - 60px);
  position:relative;z-index:1;
  background:var(--warm-white);
}
#messages{
  flex:1;overflow-y:auto;
  padding:2rem 2.2rem;
  display:flex;flex-direction:column;gap:1.2rem;
  scroll-behavior:smooth;
}
#messages::-webkit-scrollbar{width:4px}
#messages::-webkit-scrollbar-thumb{background:var(--cream-dark);border-radius:4px}
#messages::-webkit-scrollbar-track{background:transparent}

/* ── BUBBLES ── */
.bubble{
  max-width:78%;
  padding:1rem 1.3rem;
  border-radius:18px;
  line-height:1.75;
  font-size:.92rem;
  font-weight:300;
  animation:pop .3s cubic-bezier(.34,1.3,.64,1);
}
@keyframes pop{from{opacity:0;transform:translateY(10px) scale(.97)}to{opacity:1;transform:none}}

.bubble.user{
  align-self:flex-end;
  background:var(--brown);
  color:var(--cream);
  border-bottom-right-radius:5px;
  box-shadow:0 3px 14px rgba(107,79,53,.2);
}
.bubble.ai{
  align-self:flex-start;
  background:var(--cream);
  border:1px solid var(--border);
  border-bottom-left-radius:5px;
  box-shadow:0 2px 10px var(--shadow);
  color:var(--text-dark);
}
.bubble.ai .sender{
  font-size:.68rem;
  letter-spacing:.14em;
  text-transform:uppercase;
  color:var(--amber);
  font-weight:400;
  margin-bottom:.45rem;
}

/* ── RECOMMENDATION CARDS ── */
.rec-row{display:flex;flex-direction:column;gap:.65rem;margin-top:.8rem}
.rec-mini{
  display:flex;gap:.85rem;
  background:var(--warm-white);
  border:1px solid var(--border);
  border-radius:14px;
  padding:.8rem;
  cursor:pointer;
  transition:transform .2s,box-shadow .2s,border-color .2s;
}
.rec-mini:hover{
  transform:translateY(-2px);
  box-shadow:0 6px 22px rgba(107,79,53,.12);
  border-color:var(--brown-light);
}
.rec-mini img{
  width:50px;height:72px;
  object-fit:cover;
  border-radius:8px;
  flex-shrink:0;
  background:var(--cream-dark);
  box-shadow:0 2px 8px var(--shadow);
}
.rec-mini-info{flex:1;min-width:0}
.rec-mini-title{
  font-family:'Playfair Display',serif;
  font-size:.98rem;font-weight:600;
  color:var(--brown);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.rec-mini-creator{color:var(--brown-light);font-size:.77rem;margin:.18rem 0 .22rem}
.rec-mini-why{font-size:.8rem;color:var(--text-mid);line-height:1.5;font-style:italic}
.cat-badge{
  font-size:.66rem;
  padding:.12rem .55rem;
  border-radius:999px;
  margin-top:.35rem;
  display:inline-block;
  font-weight:400;letter-spacing:.05em;text-transform:uppercase;
}
.cat-badge.movie{border:1px solid var(--amber);color:var(--amber);background:rgba(201,135,74,.08)}
.cat-badge.book{border:1px solid var(--green);color:var(--green);background:rgba(90,122,92,.08)}
.rating{font-size:.74rem;color:var(--amber);margin-left:.3rem;font-weight:400}

/* ── INPUT AREA ── */
#input-area{
  padding:.9rem 2rem 1.1rem;
  border-top:1px solid var(--border);
  background:linear-gradient(to top,rgba(245,240,225,.98),rgba(253,248,239,.95));
  display:flex;gap:.7rem;align-items:flex-end;
}
#msg{
  flex:1;
  background:var(--warm-white);
  border:1.5px solid var(--border2);
  border-radius:14px;
  color:var(--text-dark);
  font-family:'Lato',sans-serif;
  font-size:.9rem;font-weight:300;
  padding:.7rem 1rem;
  outline:none;resize:none;
  max-height:120px;
  transition:border-color .25s,box-shadow .25s;
  line-height:1.55;
}
#msg:focus{
  border-color:var(--brown-light);
  box-shadow:0 0 0 3px rgba(107,79,53,.08);
}
#msg::placeholder{color:var(--brown-light);font-style:italic;opacity:.7}
.hint{font-size:.68rem;color:var(--brown-light);padding-bottom:.8rem;white-space:nowrap;opacity:.6;letter-spacing:.05em}
#send{
  background:var(--brown);
  border:none;border-radius:30px;
  color:var(--cream);
  font-family:'Lato',sans-serif;
  font-size:.8rem;font-weight:400;
  letter-spacing:.1em;text-transform:uppercase;
  padding:.72rem 1.4rem;
  cursor:pointer;
  transition:transform .2s,box-shadow .2s,background .2s;
  white-space:nowrap;
  box-shadow:0 3px 12px rgba(107,79,53,.25);
}
#send:hover{transform:translateY(-2px);box-shadow:0 5px 18px rgba(107,79,53,.3)}
#send:active{transform:translateY(0)}
#send:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}

/* ── RESIZE HANDLE ── */
#resize-handle{
  position:absolute;
  left:0;top:0;bottom:0;
  width:5px;
  cursor:col-resize;
  background:transparent;
  z-index:5;
  transition:background .2s;
}
#resize-handle:hover,#resize-handle.dragging{background:var(--amber-light)}

/* ── SIDEBAR ── */
#sidebar{
  grid-column:2;grid-row:2;
  border-left:1px solid var(--border);
  background:var(--cream);
  display:flex;flex-direction:column;
  height:calc(100vh - 60px);
  position:relative;z-index:1;
}
/* subtle green gradient at top of sidebar */
#sidebar::before{
  content:'';position:absolute;top:0;left:0;right:0;height:120px;
  background:linear-gradient(to bottom,rgba(90,122,92,.06),transparent);
  pointer-events:none;
}
.sidebar-header{
  padding:1.1rem 1.4rem;
  border-bottom:1px solid var(--border);
  font-family:'Playfair Display',serif;
  font-size:1rem;font-weight:600;
  color:var(--brown);
  letter-spacing:.02em;
  position:relative;
}
#favs-list{flex:1;overflow-y:auto;padding:.9rem;position:relative}
#favs-list::-webkit-scrollbar{width:3px}
#favs-list::-webkit-scrollbar-thumb{background:var(--cream-dark);border-radius:3px}
.empty-favs{
  color:var(--brown-light);font-size:.83rem;
  text-align:center;padding:3rem 1.2rem;
  line-height:1.9;font-style:italic;
}

.fav-card{
  background:var(--warm-white);
  border:1px solid var(--border);
  border-radius:12px;
  padding:.75rem;margin-bottom:.55rem;
  display:flex;gap:.65rem;
  transition:box-shadow .2s,border-color .2s;
}
.fav-card{position:relative}
.fav-card:hover{border-color:var(--border2);box-shadow:0 3px 12px var(--shadow)}
.fav-delete{
  position:absolute;top:.45rem;right:.5rem;
  background:none;border:none;cursor:pointer;
  color:var(--brown-light);font-size:.8rem;
  opacity:0;transition:opacity .2s,color .2s;
  padding:.1rem .3rem;border-radius:4px;
  line-height:1;
}
.fav-card:hover .fav-delete{opacity:1}
.fav-delete:hover{color:#c0392b}
.fav-card img{
  width:38px;height:55px;
  object-fit:cover;border-radius:6px;
  background:var(--cream-dark);flex-shrink:0;
  box-shadow:0 2px 6px var(--shadow);
}
.fav-title{font-size:.87rem;font-family:'Playfair Display',serif;color:var(--brown);font-weight:600}
.fav-creator{font-size:.72rem;color:var(--brown-light);margin-top:.1rem}
.fav-link{
  font-size:.72rem;color:var(--green);
  text-decoration:none;display:inline-block;margin-top:.22rem;
  transition:color .2s;
}
.fav-link:hover{color:var(--brown);text-decoration:underline}

/* ── MODAL ── */
#modal{
  display:none;position:fixed;inset:0;
  background:rgba(58,46,32,.55);
  backdrop-filter:blur(6px);
  z-index:100;align-items:center;justify-content:center;
}
#modal.open{display:flex}
.modal-box{
  background:var(--warm-white);
  border:1px solid var(--border2);
  border-radius:22px;
  padding:2rem;
  max-width:460px;width:90%;
  position:relative;
  animation:pop .28s cubic-bezier(.34,1.3,.64,1);
  box-shadow:0 24px 60px rgba(58,46,32,.22);
}
.modal-box img{
  width:100%;max-height:260px;
  object-fit:cover;border-radius:14px;
  margin-bottom:1.1rem;
  box-shadow:0 4px 18px var(--shadow);
}
.modal-title{
  font-family:'Playfair Display',serif;
  font-size:1.5rem;font-weight:700;
  color:var(--brown);line-height:1.25;
}
.modal-creator{color:var(--brown-light);margin:.3rem 0 .9rem;font-size:.87rem}
.modal-why{
  color:var(--text-mid);line-height:1.7;
  font-size:.9rem;font-style:italic;
  border-left:2px solid var(--green-pale);
  padding-left:.85rem;
}
.modal-actions{display:flex;gap:.7rem;margin-top:1.3rem;flex-wrap:wrap}
.btn-detail{
  padding:.52rem 1.2rem;border-radius:30px;
  font-family:'Lato',sans-serif;font-size:.8rem;font-weight:400;
  letter-spacing:.08em;text-transform:uppercase;
  cursor:pointer;text-decoration:none;
  display:inline-block;transition:all .2s;
}
.btn-watch{
  background:var(--brown);
  color:var(--cream);border:none;
  box-shadow:0 2px 10px rgba(107,79,53,.2);
}
.btn-watch:hover{transform:translateY(-2px);box-shadow:0 5px 16px rgba(107,79,53,.28)}
.btn-save{
  background:transparent;
  border:1.5px solid var(--green);
  color:var(--green);
}
.btn-save:hover{background:rgba(90,122,92,.08);transform:translateY(-2px)}
.btn-close{
  position:absolute;top:1rem;right:1rem;
  background:none;border:1px solid var(--border2);
  color:var(--brown-light);border-radius:999px;
  padding:.28rem .7rem;cursor:pointer;font-size:.78rem;
  transition:all .2s;
}
.btn-close:hover{border-color:var(--brown);color:var(--brown);background:rgba(107,79,53,.05)}

/* ── TYPING INDICATOR ── */
.typing{display:flex;gap:5px;align-items:center;padding:.35rem 0}
.dot{
  width:6px;height:6px;
  background:var(--brown-light);border-radius:50%;
  animation:blink 1.4s infinite;
}
.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2;transform:scale(.85)}40%{opacity:.85;transform:scale(1.15)}}

/* ── SCROLL REVEAL ── */
.reveal{opacity:0;transform:translateY(16px);transition:opacity .6s ease,transform .6s ease}
.reveal.visible{opacity:1;transform:none}

/* ── MOBILE FAV TOGGLE ── */
#fav-toggle{
  display:none;
  position:fixed;bottom:5.5rem;right:1.2rem;
  z-index:50;
  background:var(--brown);
  color:var(--cream);
  border:none;border-radius:50%;
  width:46px;height:46px;
  font-size:1.1rem;
  box-shadow:0 4px 16px rgba(107,79,53,.35);
  cursor:pointer;
  transition:transform .2s,box-shadow .2s;
}
#fav-toggle:hover{transform:scale(1.08);box-shadow:0 6px 20px rgba(107,79,53,.4)}

/* ── MOBILE ── */
@media(max-width:700px){
  body{
    grid-template-columns:1fr;
    grid-template-rows:auto 1fr;
  }
  header{padding:.75rem 1rem}
  .logo{font-size:1.2rem}
  #new-chat,#api-test-btn{font-size:.65rem;padding:.28rem .7rem}
  #lock-btn{font-size:.7rem;padding:.28rem .65rem}
  #resize-handle{display:none}
  #chat-panel{grid-column:1;grid-row:2;height:calc(100vh - 56px)}
  #messages{padding:1.2rem 1rem}
  #input-area{padding:.7rem 1rem .9rem;gap:.5rem}
  #msg{font-size:.88rem;padding:.6rem .85rem}
  .hint{display:none}
  #send{padding:.65rem 1.1rem;font-size:.75rem}

  #sidebar{
    grid-column:1;grid-row:2;
    position:fixed;
    bottom:0;left:0;right:0;
    height:70vh;
    border-left:none;
    border-top:1.5px solid var(--border2);
    border-radius:22px 22px 0 0;
    transform:translateY(100%);
    transition:transform .35s cubic-bezier(.32,1,.46,1);
    z-index:40;
    box-shadow:0 -8px 40px rgba(58,46,32,.18);
  }
  #sidebar.open{transform:translateY(0)}
  #fav-toggle{display:flex;align-items:center;justify-content:center}

  .bubble{max-width:92%}
  .modal-box{padding:1.4rem;border-radius:18px}
  .modal-box img{max-height:180px}
  .lock-box{padding:1.6rem 1.2rem}
}
</style>
</head>
<body>

<!-- floating dust motes -->
<div class="dust" id="dust"></div>

<header>
  <div class="logo">Biblio <span>AI</span></div>
  <div class="header-btns">
    <button id="lock-btn" title="Unlock unlimited messages">🔒 Locked</button>
    <a href="/api-test" id="api-test-btn">API Status</a>
    <button id="new-chat">↺ New Chat</button>
  </div>
</header>

<div id="chat-panel">
  <div id="messages"></div>
  <div id="input-area">
    <textarea id="msg" placeholder="Tell me what you enjoy… (Enter to send, Shift+Enter for new line)" rows="1"></textarea>
    <span class="hint">Enter ↵</span>
    <button id="send">Send</button>
  </div>
</div>

<button id="fav-toggle" title="Saved Favourites">⭐</button>

<div id="sidebar">
  <div id="resize-handle"></div>
  <div class="sidebar-header">⭐ Saved Favourites</div>
  <div id="favs-list"><p class="empty-favs">Your saved movies &amp; books<br>will appear here.</p></div>
</div>

<div id="lock-modal">
  <div class="lock-box">
    <div class="lock-icon" id="lock-icon">🔒</div>
    <div class="lock-title">Unlock Unlimited Access</div>
    <div class="lock-sub" id="lock-sub">You've used your 4 free messages.<br>Enter the password to continue.</div>
    <input type="password" id="lock-input" placeholder="Enter password…" autocomplete="off">
    <button id="lock-submit">Unlock →</button>
    <div id="lock-error"></div>
    <button class="lock-cancel" id="lock-cancel">Cancel</button>
  </div>
</div>

<div id="modal">
  <div class="modal-box">
    <button class="btn-close" id="modal-close">✕</button>
    <img id="modal-img" src="" alt="">
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-creator" id="modal-creator"></div>
    <div class="modal-why" id="modal-why"></div>
    <div class="modal-actions">
      <a class="btn-detail btn-watch" id="modal-link" href="#" target="_blank">View Details →</a>
      <button class="btn-detail btn-save" id="modal-save">♥ Save</button>
    </div>
  </div>
</div>

<script>
const SESSION_ID = localStorage.getItem('cineread_session') || (() => {
  const id = 'session_' + Math.random().toString(36).slice(2,9);
  localStorage.setItem('cineread_session', id);
  return id;
})();
let currentRec   = null;
const recsStore  = [];

// ── DOM refs ──────────────────────────────────────────────────────────────
const messagesEl = document.getElementById('messages');
const msgInput   = document.getElementById('msg');
const sendBtn    = document.getElementById('send');
const modal      = document.getElementById('modal');
const lockModal  = document.getElementById('lock-modal');
const lockBtn    = document.getElementById('lock-btn');

// ── UNLOCK STATE ──────────────────────────────────────────────────────────
let unlockToken = localStorage.getItem('biblio_unlock_' + SESSION_ID) || '';

const apiTestBtn = document.getElementById('api-test-btn');

function setUnlocked(token) {
  unlockToken = token;
  localStorage.setItem('biblio_unlock_' + SESSION_ID, token);
  lockBtn.textContent = '🔓 Unlocked';
  lockBtn.classList.add('unlocked');
  lockBtn.title = 'Click to lock again';
  apiTestBtn.classList.remove('hidden');
}

function setLocked() {
  unlockToken = '';
  localStorage.removeItem('biblio_unlock_' + SESSION_ID);
  lockBtn.textContent = '🔒 Locked';
  lockBtn.classList.remove('unlocked');
  lockBtn.title = 'Unlock unlimited messages';
  apiTestBtn.classList.add('hidden');
}

function updateLockBtn() {
  if (unlockToken) {
    lockBtn.textContent = '🔓 Unlocked';
    lockBtn.classList.add('unlocked');
    lockBtn.title = 'Click to lock again';
    apiTestBtn.classList.remove('hidden');
  } else {
    apiTestBtn.classList.add('hidden');
  }
}

// ── LOCK MODAL LOGIC ──────────────────────────────────────────────────────
function openLockModal(sub) {
  document.getElementById('lock-sub').innerHTML = sub ||
    'Enter the password to unlock unlimited messages.';
  document.getElementById('lock-error').textContent = '';
  document.getElementById('lock-input').value = '';
  lockModal.classList.add('open');
  setTimeout(() => document.getElementById('lock-input').focus(), 80);
}

lockBtn.addEventListener('click', () => {
  try {
    if (unlockToken) {
      setLocked();
    } else {
      openLockModal('Enter the password to unlock unlimited messages.');
    }
  } catch(err) {
    console.error('Lock button error:', err);
  }
});

document.getElementById('lock-cancel').addEventListener('click', () => lockModal.classList.remove('open'));
lockModal.addEventListener('click', e => { if (e.target === lockModal) lockModal.classList.remove('open'); });

document.getElementById('lock-submit').addEventListener('click', submitUnlock);
document.getElementById('lock-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitUnlock();
});

async function submitUnlock() {
  const pwd = document.getElementById('lock-input').value.trim();
  if (!pwd) return;
  const errEl = document.getElementById('lock-error');
  errEl.textContent = '';
  try {
    const res  = await fetch('/unlock', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({password: pwd, session_id: SESSION_ID})
    });
    const data = await res.json();
    if (data.ok) {
      setUnlocked(data.token);
      lockModal.classList.remove('open');
      document.getElementById('lock-icon').textContent = '🔓';
    } else {
      errEl.textContent = 'Wrong password. Try again.';
      document.getElementById('lock-input').value = '';
      document.getElementById('lock-input').focus();
    }
  } catch {
    errEl.textContent = 'Connection error. Try again.';
  }
}

// ── INIT ──────────────────────────────────────────────────────────────────
window.addEventListener('load', async () => {
  updateLockBtn();
  await restoreSession();
  loadFavourites();
});

async function restoreSession() {
  try {
    const res  = await fetch(`/history?session_id=${SESSION_ID}`);
    const data = await res.json();

    if (data.messages && data.messages.length > 0) {
      // Rebuild conversation from DB
      data.messages.forEach(msg => {
        if (msg.role === 'user') {
          addBubble('user', msg.content);
        } else {
          addAIBubble(msg.message, msg.recommendations);
        }
      });
    } else {
      // Fresh session — show greeting
      addBubble('ai', "Hello! I'm your personal movie & book recommender. What kind of stories do you enjoy — genres, moods, or tell me some favourites!");
    }
  } catch {
    addBubble('ai', "Hello! I'm your personal movie & book recommender. What kind of stories do you enjoy — genres, moods, or tell me some favourites!");
  }
}

// ── SEND MESSAGE ──────────────────────────────────────────────────────────
async function sendMessage() {
  const text = msgInput.value.trim();
  if (!text || sendBtn.disabled) return;

  addBubble('user', text);
  msgInput.value = '';
  msgInput.style.height = 'auto';
  sendBtn.disabled = true;

  const typingEl = addTyping();

  try {
    const res  = await fetch('/chat', {
      method: 'POST',
      headers: {
        'Content-Type':'application/json',
        'X-Unlock-Token': unlockToken
      },
      body: JSON.stringify({message: text, session_id: SESSION_ID})
    });
    const data = await res.json();
    typingEl.remove();

    if (res.status === 403 && data.error === 'locked') {
      openLockModal("You've used your 4 free messages.<br>Enter the password to keep chatting.");
      return;
    }

    if (!res.ok) throw new Error(data.error || 'Error');

    addAIBubble(data.message, data.recommendations);
  } catch(e) {
    typingEl.remove();
    addBubble('ai', '⚠ ' + e.message);
  } finally {
    sendBtn.disabled = false;
    msgInput.focus();
  }
}

// ── BUBBLE BUILDERS ───────────────────────────────────────────────────────
function addBubble(role, text) {
  const div = document.createElement('div');
  div.className = `bubble ${role}`;
  if (role === 'ai') div.innerHTML = `<div class="sender">Biblio AI</div>${escHtml(text)}`;
  else div.textContent = text;
  observeReveal(div);
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return div;
}

function addAIBubble(message, recs) {
  const div = document.createElement('div');
  div.className = 'bubble ai';
  let html = `<div class="sender">Biblio AI</div>${escHtml(message)}`;

  if (recs && recs.length) {
    html += '<div class="rec-row">';
    recs.forEach(r => {
      const idx     = recsStore.push(r) - 1;
      const poster  = r.poster_url || 'https://via.placeholder.com/52x75/0f0f1a/444?text=?';
      const rating  = r.rating ? `<span class="rating">★ ${r.rating}</span>` : '';
      const badge   = `<span class="cat-badge ${r.category}">${r.category}</span>`;
      html += `
        <div class="rec-mini" data-rec-idx="${idx}">
          <img src="${escHtml(poster)}" alt="${escHtml(r.title)}" onerror="this.src='https://via.placeholder.com/52x75/0f0f1a/444?text=?'">
          <div class="rec-mini-info">
            <div class="rec-mini-title">${escHtml(r.title)}${rating}</div>
            <div class="rec-mini-creator">${escHtml(r.creator||'')}</div>
            <div class="rec-mini-why">${escHtml(r.why||'')}</div>
            ${badge}
          </div>
        </div>`;
    });
    html += '</div>';
  }

  div.innerHTML = html;
  div.querySelectorAll('.rec-mini').forEach(el => {
    el.addEventListener('click', () => openModal(recsStore[+el.dataset.recIdx]));
  });
  observeReveal(div);
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function addTyping() {
  const div = document.createElement('div');
  div.className = 'bubble ai';
  div.innerHTML = '<div class="sender">Biblio AI</div><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return div;
}

// ── MODAL ─────────────────────────────────────────────────────────────────
function openModal(rec) {
  currentRec = rec;
  document.getElementById('modal-img').src    = rec.poster_url || 'https://via.placeholder.com/460x280/0f0f1a/444?text=No+Image';
  document.getElementById('modal-title').textContent   = rec.title || '';
  document.getElementById('modal-creator').textContent = rec.creator || '';
  document.getElementById('modal-why').textContent     = rec.why || '';
  const link = document.getElementById('modal-link');
  link.href = rec.detail_url || '#';
  link.textContent = rec.category === 'movie' ? 'View on TMDB →' : 'View on Open Library →';
  modal.classList.add('open');
}

document.getElementById('modal-close').addEventListener('click', () => modal.classList.remove('open'));
modal.addEventListener('click', e => { if (e.target === modal) modal.classList.remove('open'); });

document.getElementById('modal-save').addEventListener('click', async () => {
  if (!currentRec) return;
  await fetch('/favourite', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({...currentRec, session_id: SESSION_ID})
  });
  modal.classList.remove('open');
  loadFavourites();
});

// ── FAVOURITES SIDEBAR ────────────────────────────────────────────────────
async function loadFavourites() {
  const res  = await fetch(`/favourites?session_id=${SESSION_ID}`);
  const data = await res.json();
  const list = document.getElementById('favs-list');
  if (!data.favourites || !data.favourites.length) {
    list.innerHTML = '<p class="empty-favs">Your saved movies &amp; books<br>will appear here.</p>';
    return;
  }
  list.innerHTML = data.favourites.map(f => `
    <div class="fav-card" data-id="${f.id}">
      <button class="fav-delete" title="Remove">✕</button>
      <img src="${f.poster_url||'https://via.placeholder.com/40x58/0f0f1a/444?text=?'}" onerror="this.src='https://via.placeholder.com/40x58/0f0f1a/444?text=?'" alt="">
      <div>
        <div class="fav-title">${escHtml(f.title)}</div>
        <div class="fav-creator">${escHtml(f.creator||'')}</div>
        <a class="fav-link" href="${f.detail_url||'#'}" target="_blank">View →</a>
      </div>
    </div>
  `).join('');
  list.querySelectorAll('.fav-delete').forEach(btn => {
    btn.addEventListener('click', async () => {
      const id = btn.closest('.fav-card').dataset.id;
      await fetch(`/favourite/${id}?session_id=${SESSION_ID}`, {method:'DELETE'});
      loadFavourites();
    });
  });
}

// ── NEW CHAT ──────────────────────────────────────────────────────────────
document.getElementById('new-chat').addEventListener('click', async () => {
  await fetch('/clear', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({session_id: SESSION_ID})
  });
  recsStore.length = 0;
  messagesEl.innerHTML = '';
  addBubble('ai', 'Fresh start! Tell me what kind of movies or books you enjoy.');
  loadFavourites(); // favourites are kept — just refresh the sidebar to confirm
});

// ── EVENTS ────────────────────────────────────────────────────────────────
sendBtn.addEventListener('click', sendMessage);

// Enter = send | Shift+Enter = new line
msgInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

msgInput.addEventListener('input', () => {
  msgInput.style.height = 'auto';
  msgInput.style.height = msgInput.scrollHeight + 'px';
});

function escHtml(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── DUST PARTICLES ────────────────────────────────────────────────────────
(function spawnDust() {
  const container = document.getElementById('dust');
  for (let i = 0; i < 18; i++) {
    const m = document.createElement('div');
    m.className = 'mote';
    m.style.left      = Math.random() * 100 + 'vw';
    m.style.animationDuration = (12 + Math.random() * 20) + 's';
    m.style.animationDelay   = (Math.random() * 18) + 's';
    m.style.width = m.style.height = (1.5 + Math.random() * 2.5) + 'px';
    container.appendChild(m);
  }
})();

// ── SCROLL REVEAL ─────────────────────────────────────────────────────────
const revealObserver = new IntersectionObserver(entries => {
  entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
}, { threshold: 0.1 });
function observeReveal(el) { el.classList.add('reveal'); revealObserver.observe(el); }

// ── SIDEBAR RESIZE (desktop) ──────────────────────────────────────────────
const resizeHandle = document.getElementById('resize-handle');
let isResizing = false;

resizeHandle.addEventListener('mousedown', e => {
  if (window.innerWidth <= 700) return;
  e.preventDefault();
  isResizing = true;
  resizeHandle.classList.add('dragging');
  document.body.style.userSelect = 'none';
  document.body.style.cursor = 'col-resize';
});

document.addEventListener('mousemove', e => {
  if (!isResizing) return;
  const newW = Math.min(Math.max(window.innerWidth - e.clientX, 200), 620);
  document.documentElement.style.setProperty('--sidebar-w', newW + 'px');
});

document.addEventListener('mouseup', () => {
  if (!isResizing) return;
  isResizing = false;
  resizeHandle.classList.remove('dragging');
  document.body.style.userSelect = '';
  document.body.style.cursor = '';
});

// ── MOBILE FAV DRAWER ─────────────────────────────────────────────────────
const sidebar    = document.getElementById('sidebar');
const favToggle  = document.getElementById('fav-toggle');

favToggle.addEventListener('click', () => {
  const open = sidebar.classList.toggle('open');
  favToggle.textContent = open ? '✕' : '⭐';
  if (open) loadFavourites();
});

document.addEventListener('click', e => {
  if (window.innerWidth <= 700 &&
      sidebar.classList.contains('open') &&
      !sidebar.contains(e.target) &&
      e.target !== favToggle) {
    sidebar.classList.remove('open');
    favToggle.textContent = '⭐';
  }
});
</script>
